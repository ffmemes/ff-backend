version: '3.7'

services:
  app:
    container_name: app
    image: app_image
    env_file:
      - .env
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ./:/src
    ports:
      - "16000:8000"
    depends_on:
      - app_db

  prefect-server:
    image: prefecthq/prefect:3-latest
    container_name: prefect_server
    command: prefect server start --host 0.0.0.0
    ports:
      - "4200:4200"
    environment:
      PREFECT_SERVER_DATABASE_CONNECTION_URL: "postgresql+asyncpg://app:app@app_db:5432/prefect"
    depends_on:
      - app_db
    restart: unless-stopped

  prefect-runner:
    container_name: prefect_runner
    image: app_image
    env_file:
      - .env
    environment:
      PREFECT_API_URL: "http://prefect-server:4200/api"
      PYTHONPATH: "/src"
    build:
      context: .
      dockerfile: Dockerfile
    command: python scripts/serve_flows.py
    volumes:
      - ./:/src
    depends_on:
      - prefect-server
      - app_db
    restart: unless-stopped

  app_tgbot_polling:
    container_name: app_tgbot_polling
    image: app_image
    env_file:
      - .env
    build:
      context: .
      dockerfile: Dockerfile
    command: python ./start-polling.py
    volumes:
      - ./:/src
    depends_on:
      - app_db

  app_db:
    container_name: app_db
    hostname: app_db
    image: library/postgres:14.1
    env_file:
      - .env
    volumes:
      - app_pg_data:/var/lib/postgresql/data
      - app_pg_data_backups:/backups
      - ./scripts/postgres:/scripts
    ports:
      - "65432:5432"

  app_redis:
    image: redis:6.2-alpine
    hostname: redis
    container_name: app_redis
    command:
      - 'redis-server'
      - '--requirepass myStrongPassword'
    ports:
      - 36379:6379


volumes:
  app_pg_data:
    driver: "local"
  app_pg_data_backups:
    driver: "local"

networks:
  default:
    external: true
    name: ffmemes_network
