[pytest]
asyncio_mode = auto
env =
    SITE_URL=
    # D: prefix = default (only set if not already in environment)
    # Override locally by exporting DATABASE_URL / REDIS_URL before running pytest
    D:DATABASE_URL=postgresql+asyncpg://app:app@app_db:5432/app
    D:REDIS_URL=redis://:myStrongPassword@redis:6379

    SITE_DOMAIN=127.0.0.1
    SECURE_COOKIES=false

    ENVIRONMENT=TESTING

    CORS_HEADERS=["*"]
    CORS_ORIGINS=["http://localhost:3000"]
